{% extends "base.html" %}
{% block title %}注册 — Hastrid Booking{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>创建账号</h1>
    <p class="auth-sub">几分钟内搭好你的预约页面</p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="field-label">商家名称</label>
      <input class="form-input" type="text" name="name" id="biz-name" placeholder="例：Chris 美发工作室" required value="{{ form.get('name','') }}" autofocus>

      <label class="field-label">你的预约链接</label>
      <div class="slug-preview">
        <span class="slug-prefix">qi.app/book/</span>
        <input class="slug-input form-input" type="text" name="slug" id="biz-slug" placeholder="chris-hair-studio" required value="{{ form.get('slug','') }}">
      </div>

      <label class="field-label">邮箱</label>
      <input class="form-input" type="email" name="email" placeholder="you@email.com" required value="{{ form.get('email','') }}">

      <label class="field-label">商家电话 <span style="color:#888;font-weight:400">（用于发送预约通知）</span></label>
      <input class="form-input" type="tel" name="phone" placeholder="e.g. 9095551234" required value="{{ form.get('phone','') }}">

      <label class="field-label">服务类别</label>
      <select class="form-input" name="category" required>
        <option value="">请选择类别...</option>
        {% for cat in categories %}
        <option value="{{ cat }}" {% if form.get('category') == cat %}selected{% endif %}>{{ cat }}</option>
        {% endfor %}
      </select>

      <label class="field-label">密码</label>
      <input class="form-input" type="password" name="password" placeholder="至少 6 个字符" required>

      <button type="submit" class="btn-primary-full">创建账号 →</button>
    </form>
    <p class="auth-switch">已有账号？<a href="{{ url_for('auth.login') }}">去登录</a></p>
  </div>
</div>

<script>
  const nameEl = document.getElementById('biz-name');
  const slugEl = document.getElementById('biz-slug');
  let edited = slugEl.value !== '';
  nameEl.addEventListener('input', () => {
    if (edited) return;
    slugEl.value = nameEl.value.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  });
  slugEl.addEventListener('input', () => { edited = true; });
</script>
{% endblock %}
