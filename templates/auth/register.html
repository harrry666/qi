{% extends "base.html" %}
{% block title %}Get Started — Qi{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="auth-sub">Set up your booking page in minutes</p>
    <form method="POST">
      <label class="field-label">Business Name</label>
      <input class="form-input" type="text" name="name" id="biz-name" placeholder="e.g. Chris Hair Studio" required value="{{ form.get('name','') }}" autofocus>

      <label class="field-label">Your booking URL</label>
      <div class="slug-preview">
        <span class="slug-prefix">qi.app/book/</span>
        <input class="slug-input form-input" type="text" name="slug" id="biz-slug" placeholder="chris-hair-studio" required value="{{ form.get('slug','') }}">
      </div>

      <label class="field-label">Email</label>
      <input class="form-input" type="email" name="email" placeholder="you@email.com" required value="{{ form.get('email','') }}">

      <label class="field-label">Business Phone <span style="color:#888;font-weight:400">(for customer notifications)</span></label>
      <input class="form-input" type="tel" name="phone" placeholder="e.g. 9095551234" required value="{{ form.get('phone','') }}">

      <label class="field-label">Service Category</label>
      <select class="form-input" name="category" required>
        <option value="">Select a category...</option>
        {% for cat in categories %}
        <option value="{{ cat }}" {% if form.get('category') == cat %}selected{% endif %}>{{ cat }}</option>
        {% endfor %}
      </select>

      <label class="field-label">Password</label>
      <input class="form-input" type="password" name="password" placeholder="At least 6 characters" required>

      <button type="submit" class="btn-primary-full">Create account →</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</div>

<script>
  const nameEl = document.getElementById('biz-name');
  const slugEl = document.getElementById('biz-slug');
  let edited = slugEl.value !== '';
  nameEl.addEventListener('input', () => {
    if (edited) return;
    slugEl.value = nameEl.value.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  });
  slugEl.addEventListener('input', () => { edited = true; });
</script>
{% endblock %}
