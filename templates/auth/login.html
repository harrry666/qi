{% extends "base.html" %}
{% block title %}{{ t('auth.login.title_tag') }}{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>{{ t('auth.login.title') }}</h1>
    <p class="auth-sub">{{ t('auth.login.subtitle') }}</p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="field-label">{{ t('auth.login.email') }}</label>
      <input class="form-input" type="email" name="email" placeholder="you@email.com" required autofocus>
      <label class="field-label">{{ t('auth.login.password') }}</label>
      <input class="form-input" type="password" name="password" placeholder="{{ t('auth.login.password_ph') }}" required>
      <button type="submit" class="btn-primary-full">{{ t('auth.login.submit') }}</button>
    </form>
    <p class="auth-switch" style="margin-bottom:8px"><a href="{{ url_for('auth.forgot_password') }}">{{ t('auth.login.forgot') }}</a></p>
    <p class="auth-switch">{{ t('auth.login.no_account') }}<a href="{{ url_for('auth.register') }}">{{ t('auth.login.register') }}</a></p>
  </div>
</div>
{% endblock %}
