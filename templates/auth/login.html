{% extends "base.html" %}
{% block title %}登录 — Hastrid Booking{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>登录</h1>
    <p class="auth-sub">欢迎回来</p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="field-label">邮箱</label>
      <input class="form-input" type="email" name="email" placeholder="you@email.com" required autofocus>
      <label class="field-label">密码</label>
      <input class="form-input" type="password" name="password" placeholder="请输入密码" required>
      <button type="submit" class="btn-primary-full">登录</button>
    </form>
    <p class="auth-switch" style="margin-bottom:8px"><a href="{{ url_for('auth.forgot_password') }}">忘记密码？</a></p>
    <p class="auth-switch">还没有账号？<a href="{{ url_for('auth.register') }}">免费注册</a></p>
  </div>
</div>
{% endblock %}
