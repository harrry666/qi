{% extends "base.html" %}
{% block title %}{{ t('auth.forgot.title_tag') }}{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>{{ t('auth.forgot.title') }}</h1>
    <p class="auth-sub">{{ t('auth.forgot.sub_phone') }}</p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="method" value="phone">
      <label class="field-label">{{ t('auth.forgot.phone_label') }}</label>
      <input class="form-input" type="tel" name="phone" placeholder="e.g. 9095551234" required autofocus>
      <button type="submit" class="btn-primary-full">{{ t('auth.forgot.submit') }}</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('auth.login') }}">{{ t('auth.forgot.back_login') }}</a></p>
  </div>
</div>
{% endblock %}
