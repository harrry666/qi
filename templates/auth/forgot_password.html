{% extends "base.html" %}
{% block title %}忘记密码 — Hastrid Booking{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>忘记密码</h1>
    <p class="auth-sub">输入注册时的手机号，我们会发短信把重置链接给你</p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="method" value="phone">
      <label class="field-label">注册手机号</label>
      <input class="form-input" type="tel" name="phone" placeholder="e.g. 9095551234" required autofocus>
      <button type="submit" class="btn-primary-full">发送重置链接</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('auth.login') }}">← 返回登录</a></p>
  </div>
</div>
{% endblock %}
