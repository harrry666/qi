{% extends "base.html" %}
{% block title %}忘记密码 — Hastrid Booking{% endblock %}
{% block head %}
<style>
  .fp-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .fp-tab {
    flex: 1; text-align: center; padding: 10px 0; border-radius: 10px;
    border: 1.5px solid var(--line, #e5e0d8); background: var(--white, #fff);
    color: var(--muted, #8a8378); font-weight: 600; font-size: 14px; cursor: pointer;
  }
  .fp-tab.on { border-color: var(--gold); color: var(--text); background: #fff8e6; }
</style>
{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>忘记密码</h1>
    <p class="auth-sub" id="fp-sub">输入注册邮箱，我们会发送重置链接</p>
    <div class="fp-tabs">
      <div class="fp-tab on" id="tab-email">📧 邮箱找回</div>
      <div class="fp-tab" id="tab-phone">📱 手机号找回</div>
    </div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="hidden" name="method" id="fp-method" value="email">
      <div id="field-email">
        <label class="field-label">邮箱</label>
        <input class="form-input" type="email" name="email" id="inp-email" placeholder="you@email.com" required autofocus>
      </div>
      <div id="field-phone" style="display:none">
        <label class="field-label">注册手机号</label>
        <input class="form-input" type="tel" name="phone" id="inp-phone" placeholder="e.g. 9095551234" disabled>
      </div>
      <button type="submit" class="btn-primary-full">发送重置链接</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('auth.login') }}">← 返回登录</a></p>
  </div>
</div>
<script>
  const tabE = document.getElementById('tab-email'), tabP = document.getElementById('tab-phone');
  const fE = document.getElementById('field-email'), fP = document.getElementById('field-phone');
  const iE = document.getElementById('inp-email'), iP = document.getElementById('inp-phone');
  const method = document.getElementById('fp-method'), sub = document.getElementById('fp-sub');
  function pick(m) {
    const email = m === 'email';
    method.value = m;
    tabE.classList.toggle('on', email); tabP.classList.toggle('on', !email);
    fE.style.display = email ? '' : 'none'; fP.style.display = email ? 'none' : '';
    iE.disabled = !email; iE.required = email;
    iP.disabled = email; iP.required = !email;
    sub.textContent = email ? '输入注册邮箱，我们会发送重置链接' : '输入注册手机号，我们会短信发送重置链接';
    (email ? iE : iP).focus();
  }
  tabE.onclick = () => pick('email');
  tabP.onclick = () => pick('phone');
</script>
{% endblock %}
