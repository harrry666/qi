{% extends "base.html" %}
{% block title %}忘记密码 — Qi{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>忘记密码</h1>
    <p class="auth-sub">输入注册邮箱，我们会发送重置链接</p>
    <form method="POST">
      <label class="field-label">邮箱</label>
      <input class="form-input" type="email" name="email" placeholder="you@email.com" required autofocus>
      <button type="submit" class="btn-primary-full">发送重置链接</button>
    </form>
    <p class="auth-switch"><a href="{{ url_for('auth.login') }}">← 返回登录</a></p>
  </div>
</div>
{% endblock %}
