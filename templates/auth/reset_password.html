{% extends "base.html" %}
{% block title %}重置密码 — Hastrid Booking{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>设置新密码</h1>
    <p class="auth-sub">请输入你的新密码</p>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label class="field-label">新密码</label>
      <div class="pw-field">
        <input class="form-input" type="password" name="password" id="pw" placeholder="至少 6 个字符" required autofocus>
        <button type="button" class="pw-toggle" data-target="pw" aria-label="显示密码">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <label class="field-label">确认新密码</label>
      <div class="pw-field">
        <input class="form-input" type="password" name="password_confirm" id="pw2" placeholder="再次输入密码" required>
        <button type="button" class="pw-toggle" data-target="pw2" aria-label="显示密码">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <p class="field-error" id="pw-error">两次输入的密码不一致</p>

      <button type="submit" class="btn-primary-full">确认重置</button>
    </form>
  </div>
</div>
<script>
  document.querySelectorAll('.pw-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      btn.classList.toggle('showing', !showing);
    });
  });
  const pw = document.getElementById('pw'), pw2 = document.getElementById('pw2'), err = document.getElementById('pw-error');
  document.querySelector('form').addEventListener('submit', (e) => {
    if (pw.value !== pw2.value) {
      e.preventDefault();
      err.classList.add('show');
      pw2.focus();
    } else {
      err.classList.remove('show');
    }
  });
  pw2.addEventListener('input', () => err.classList.remove('show'));
</script>
{% endblock %}
