{% extends "base.html" %}
{% block title %}重置密码 — Qi{% endblock %}
{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <h1>设置新密码</h1>
    <p class="auth-sub">请输入你的新密码</p>
    <form method="POST">
      <label class="field-label">新密码</label>
      <input class="form-input" type="password" name="password" placeholder="至少 6 个字符" required autofocus>
      <button type="submit" class="btn-primary-full">确认重置</button>
    </form>
  </div>
</div>
{% endblock %}
