<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — 页面不存在 | Hastrid Booking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAF8F5; color: #1A1209; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 40px 24px; }
    .error-code { font-family: 'Noto Serif SC', serif; font-size: clamp(80px, 20vw, 140px); font-weight: 900; color: #C9A84C; line-height: 1; letter-spacing: -4px; }
    .error-title { font-size: 22px; font-weight: 600; margin: 16px 0 8px; }
    .error-sub { color: #6B5C3E; font-size: 15px; margin-bottom: 32px; }
    .btn-home { display: inline-block; background: #C9A84C; color: #fff; text-decoration: none; padding: 12px 28px; border-radius: 8px; font-size: 15px; font-weight: 600; }
    .btn-home:hover { background: #A8882A; }
  </style>
</head>
<body>
  <div class="error-code">404</div>
  <div class="error-title">页面不存在</div>
  <div class="error-sub">你要找的内容可能已经移动或删除了。</div>
  <a href="/" class="btn-home">返回首页</a>
</body>
</html>
