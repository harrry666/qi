<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ t('admin.notify.title') }}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1120; color: #e8e0f0; font-family: system-ui, sans-serif; min-height: 100vh; padding: 2rem; }
  h1 { color: #C9A84C; font-size: 1.5rem; margin-bottom: 1.2rem; }
  .back { color: #7c6a90; font-size: .85rem; text-decoration: none; float: right; }
  .back:hover { color: #C9A84C; }
  .admin-lang { float: right; font-size: .8rem; margin-left: 16px; }
  .admin-lang a { color: #7c6a90; text-decoration: none; margin-left: 6px; }
  .admin-lang a.active { color: #C9A84C; font-weight: 700; }
  .card { background: #241830; border-radius: 12px; padding: 1.4rem 1.5rem; max-width: 640px; }
  .sub { color: #9a8ab0; font-size: .9rem; margin-bottom: 1.2rem; }
  label { display: block; font-size: .85rem; color: #b7a8cc; margin: 1rem 0 .4rem; }
  input, textarea { width: 100%; background: #1a1120; border: 1px solid #3a2f48; border-radius: 8px;
    color: #e8e0f0; padding: 10px 12px; font-size: .95rem; font-family: inherit; }
  textarea { min-height: 180px; resize: vertical; line-height: 1.5; }
  .send-btn { margin-top: 1.2rem; background: #C9A84C; color: #1a1120; border: none; font-weight: 700;
    padding: 11px 26px; border-radius: 8px; cursor: pointer; font-size: .95rem; }
  .ok { background: #2a6040; color: #5de88a; border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; font-weight: 600; }
</style>
</head>
<body>
<h1>{{ t('admin.notify.heading') }}
  <span class="admin-lang">
    <a href="{{ url_for('set_lang', lang='zh') }}" class="{% if lang == 'zh' %}active{% endif %}">中</a>
    <a href="{{ url_for('set_lang', lang='en') }}" class="{% if lang == 'en' %}active{% endif %}">EN</a>
  </span>
  <a class="back" href="/admin">{{ t('admin.back_to_merchants') }}</a>
</h1>

<div class="card">
  {% if sent %}<div class="ok">{{ t('admin.notify.sent_msg', n=sent) }}</div>{% endif %}
  <div class="sub">{{ t('admin.notify.desc', n='<b style="color:#C9A84C">' ~ count ~ '</b>')|safe }}</div>

  <form method="POST" action="/admin/notify/send" onsubmit="return confirm({{ t('admin.notify.confirm_send', n=count)|tojson }})">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>{{ t('admin.notify.subject_label') }}</label>
    <input type="text" name="subject" maxlength="120" required placeholder="{{ t('admin.notify.subject_ph') }}">
    <label>{{ t('admin.notify.body_label') }}</label>
    <textarea name="body" required placeholder="{{ t('admin.notify.body_ph') }}"></textarea>
    <button type="submit" class="send-btn">{{ t('admin.notify.send_btn', n=count) }}</button>
  </form>
</div>
</body>
</html>
