{% extends "dashboard/layout.html" %}
{% block title %}{{ t('dash.feedback.title_tag') }}{% endblock %}
{% block content %}

<style>
@media (max-width:600px){
  .add-service-form{padding:18px 16px}
}
</style>

<div class="page-title">{{ t('dash.feedback.page_title') }}</div>
<p style="color:var(--muted);font-size:14px;margin-top:-12px;margin-bottom:24px">
  {{ t('dash.feedback.desc') }}
</p>

<div class="add-service-form" style="max-width:560px">
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <span class="btn-label">{{ t('dash.feedback.label') }}</span>
    <textarea class="dash-input" name="message" rows="5" placeholder="{{ t('dash.feedback.ph') }}" required></textarea>
    <button type="submit" class="btn-add" style="width:auto;padding:10px 28px;margin-top:14px">{{ t('dash.feedback.submit') }}</button>
  </form>
</div>

{% endblock %}
