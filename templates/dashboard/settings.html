{% extends "dashboard/layout.html" %}
{% block title %}Settings{% endblock %}
{% block content %}

<div class="page-title">⚙️ Settings</div>

<div class="settings-card">
  <h2>Business Profile</h2>
  <form method="POST">
    <label class="dash-label">Business Name *</label>
    <input class="dash-input" type="text" name="name" value="{{ biz.name }}" required>

    <label class="dash-label">Address</label>
    <input class="dash-input" type="text" name="address" value="{{ biz.address or '' }}" placeholder="123 Main St, City, State">

    <label class="dash-label">Phone</label>
    <input class="dash-input" type="text" name="phone" value="{{ biz.phone or '' }}" placeholder="(555) 000-0000">

    <label class="dash-label">Category</label>
    <select class="dash-input" name="category">
      {% for cat in categories %}
      <option value="{{ cat }}" {% if biz.category == cat %}selected{% endif %}>{{ cat }}</option>
      {% endfor %}
    </select>

    <label class="dash-label">Description</label>
    <textarea class="dash-input dash-textarea" name="description" placeholder="Short description shown on your booking page">{{ biz.description or '' }}</textarea>

    <button type="submit" class="btn-save" style="margin-top:20px">Save Settings</button>
  </form>
</div>

<div class="settings-card" style="margin-top:20px">
  <h2>Your Booking URL</h2>
  <div class="slug-display">{{ booking_url }}</div>
  <button onclick="navigator.clipboard.writeText('{{ booking_url }}')" style="margin-top:8px;padding:6px 14px;font-size:13px;border:1px solid #ccc;border-radius:6px;cursor:pointer;background:transparent">Copy Link</button>
  <p style="font-size:13px;color:#555;margin-top:8px">Share this link with your customers.</p>
</div>

{% endblock %}
