{% extends "dashboard/layout.html" %}
{% block title %}{{ t('dash.hours.title_tag') }}{% endblock %}
{% block content %}

<style>
@media (max-width:600px){
  .hours-form{padding:18px 16px}
  .hours-row{align-items:flex-start}
  .hours-day{width:100%}
  .time-range{width:100%}
  .time-range input[type=time]{flex:1;width:auto !important;min-width:0}
  .hours-form .btn-save{width:100%}
}
</style>

<div class="page-title">{{ t('dash.hours.page_title') }}</div>

<div class="hours-form">
  <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% for day in days %}
    <div class="hours-row">
      <div class="hours-day">{{ day.name }}</div>
      <label class="hours-closed-wrap">
        <input type="checkbox" name="{{ day.key }}_active" {% if not day.data.get('is_closed') %}checked{% endif %}
               onchange="toggleDay('{{ day.key }}', this.checked)">
        {{ t('dash.hours.open_label') }}
      </label>
      <div class="time-range" id="range-{{ day.key }}" {% if day.data.get('is_closed') %}style="opacity:0.3;pointer-events:none"{% endif %}>
        <input class="dash-input" type="time" name="{{ day.key }}_open"
               value="{{ day.data.get('open_time', '09:00') }}" style="width:120px">
        <span>{{ t('dash.hours.to') }}</span>
        <input class="dash-input" type="time" name="{{ day.key }}_close"
               value="{{ day.data.get('close_time', '18:00') }}" style="width:120px">
      </div>
    </div>
    {% endfor %}
    <button type="submit" class="btn-save">{{ t('dash.hours.save') }}</button>
  </form>
</div>

<script>
function toggleDay(key, isOpen) {
  const el = document.getElementById('range-' + key);
  el.style.opacity = isOpen ? '1' : '0.3';
  el.style.pointerEvents = isOpen ? '' : 'none';
}
</script>

{% endblock %}
