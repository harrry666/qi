{% extends "dashboard/layout.html" %}
{% block title %}营业时间{% endblock %}
{% block content %}

<div class="page-title">🕐 营业时间</div>

<div class="hours-form">
  <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% for day in days %}
    <div class="hours-row">
      <div class="hours-day">{{ day.name }}</div>
      <label class="hours-closed-wrap">
        <input type="checkbox" name="{{ day.key }}_closed" {% if day.data.get('is_closed') %}checked{% endif %}
               onchange="toggleDay('{{ day.key }}', this.checked)">
        休息
      </label>
      <div class="time-range" id="range-{{ day.key }}" {% if day.data.get('is_closed') %}style="opacity:0.3;pointer-events:none"{% endif %}>
        <input class="dash-input" type="time" name="{{ day.key }}_open"
               value="{{ day.data.get('open_time', '09:00') }}" style="width:120px">
        <span>至</span>
        <input class="dash-input" type="time" name="{{ day.key }}_close"
               value="{{ day.data.get('close_time', '18:00') }}" style="width:120px">
      </div>
    </div>
    {% endfor %}
    <button type="submit" class="btn-save">保存</button>
  </form>
</div>

<script>
function toggleDay(key, closed) {
  const el = document.getElementById('range-' + key);
  el.style.opacity = closed ? '0.3' : '1';
  el.style.pointerEvents = closed ? 'none' : '';
}
</script>

{% endblock %}
